apiVersion: apps/v1
kind: Deployment
metadata:
  name: mario-deployment
  namespace: rithika-ns
spec:
  replicas: 2  # You can adjust the number of replicas as needed
  selector:
    matchLabels:
      app: mario
  template:
    metadata:
      labels:
        app: mario
    spec:
      containers:
      - name: mario-container
        image: rithika17/mario:latest 
        ports:
        - containerPort: 80
